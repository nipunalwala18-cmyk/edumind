version: "3.9"

# ── EduMind AI — Docker Compose ────────────────────────────────────────────────
#
# Services:
#   edumind     — FastAPI application (port 8000)
#   ollama      — Ollama LLM server (port 11434); GPU-accelerated if available
#
# Persistent volumes:
#   chroma_data — ChromaDB vector store
#   sqlite_data — SQLite ledger (ingestion_ledger.db) + institutional.db
#   ollama_data — Ollama model cache (avoids re-downloading qwen3:8b on restart)
#   staging_vol — uploaded document staging area
#
# Usage:
#   docker compose up --build           # first run (builds image, downloads model)
#   docker compose up -d                # subsequent runs (detached)
#   docker compose logs -f edumind      # tail application logs
#   docker compose exec edumind bash    # shell into app container

services:

  # ── Ollama LLM server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: edumind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU acceleration: uncomment the deploy block if NVIDIA GPU is available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Model pull (one-shot init job) ───────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: edumind_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen3:8b &&
        echo 'Model qwen3:8b ready.'
      "
    restart: "no"

  # ── EduMind application ───────────────────────────────────────────────────────
  edumind:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: edumind_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Ollama endpoint — points to the sibling container
      OLLAMA_BASE_URL: "http://ollama:11434"
      # JWT secret — change this in production!
      JWT_SECRET_KEY: "change-me-in-production-use-a-long-random-string"
      # HuggingFace token (optional — removes rate-limit warnings)
      # HF_TOKEN: "hf_..."
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
      # Python path includes project root
      PYTHONPATH: "/app"
    volumes:
      - chroma_data:/app/vector_store/chroma_db
      - sqlite_data:/app
      - staging_vol:/app/data/staging
      # Mount HuggingFace model cache so models survive container rebuilds
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/'); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  ollama_data:
    name: edumind_ollama_data
  chroma_data:
    name: edumind_chroma_data
  sqlite_data:
    name: edumind_sqlite_data
  staging_vol:
    name: edumind_staging
  hf_cache:
    name: edumind_hf_cache
